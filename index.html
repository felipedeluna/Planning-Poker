<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Poker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c-bg: #0d0d12;
    --c-surface: #14141e;
    --c-surface2: #1c1c2a;
    --c-surface3: #232336;
    --c-border: rgba(255,255,255,0.07);
    --c-border2: rgba(255,255,255,0.13);
    --c-text: #f0eff8;
    --c-text2: rgba(240,239,248,0.55);
    --c-text3: rgba(240,239,248,0.3);
    --c-accent: #7F77DD;
    --c-accent2: #534AB7;
    --c-teal: #1D9E75;
    --c-teal2: #0F6E56;
    --c-coral: #D85A30;
    --c-amber: #BA7517;
    --c-pink: #D4537E;
    --c-green: #639922;
    --font: 'Syne', sans-serif;
    --mono: 'DM Mono', monospace;
    --r: 12px;
    --r2: 8px;
  }

  body {
    background: var(--c-bg);
    color: var(--c-text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── BG texture ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 60% 50% at 70% 20%, rgba(127,119,221,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 10% 80%, rgba(29,158,117,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── Join screen ─── */
  #join-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: var(--c-bg);
  }
  #join-screen::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(127,119,221,0.15) 0%, transparent 70%);
  }

  .join-card {
    position: relative;
    background: var(--c-surface);
    border: 1px solid var(--c-border2);
    border-radius: 20px;
    padding: 48px;
    width: 420px;
    text-align: center;
  }
  .join-card .logo {
    font-size: 48px; margin-bottom: 8px;
  }
  .join-card h1 {
    font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, #a49ef0, #7F77DD 50%, #5DCAA5);
    background-clip: text;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .join-card p {
    color: var(--c-text2); font-size: 14px; margin-bottom: 32px;
  }
  .join-input {
    width: 100%;
    background: var(--c-surface2);
    border: 1px solid var(--c-border2);
    border-radius: var(--r2);
    color: var(--c-text);
    font-family: var(--font);
    font-size: 16px;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.2s;
  }
  .join-input:focus { border-color: var(--c-accent); }
  .join-btn {
    margin-top: 12px;
    width: 100%;
    background: var(--c-accent);
    border: none;
    border-radius: var(--r2);
    color: white;
    font-family: var(--font);
    font-size: 16px; font-weight: 700;
    padding: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .join-btn:hover { background: var(--c-accent2); }
  .join-btn:active { transform: scale(0.98); }
  .join-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .join-input-sm {
    width: 100%;
    background: var(--c-surface2);
    border: 1px solid var(--c-border2);
    border-radius: var(--r2);
    color: var(--c-text);
    font-family: var(--font);
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
  }
  .join-input-sm:focus { border-color: var(--c-accent); }
  .join-btn.secondary {
    background: transparent;
    border: 1px solid var(--c-border2);
    color: var(--c-text2);
    padding: 10px 12px;
    width: auto;
    margin-top: 0;
  }
  .join-btn.secondary:hover { background: var(--c-surface3); color: var(--c-text); }
  .owned-rooms {
    margin-top: 14px;
    border-top: 1px solid var(--c-border);
    padding-top: 12px;
    text-align: left;
  }
  .owned-rooms-title {
    font-size: 10px;
    letter-spacing: 1.2px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--c-text3);
    margin-bottom: 8px;
  }
  .owned-room-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    border: 1px solid var(--c-border);
    border-radius: 8px;
    padding: 8px;
    margin-bottom: 6px;
  }
  .owned-room-item .meta {
    font-size: 11px;
    color: var(--c-text3);
  }

  /* ─── Layout ─── */
  #app { display: none; position: relative; z-index: 1; }
  .app-grid {
    display: grid;
    grid-template-columns: 280px 1fr 260px;
    grid-template-rows: 64px 1fr;
    height: 100vh;
    gap: 0;
  }

  /* ─── Header ─── */
  .header {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    border-bottom: 1px solid var(--c-border);
    background: rgba(13,13,18,0.8);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 50;
  }
  .header-brand {
    display: flex; align-items: center; gap: 10px;
    font-size: 18px; font-weight: 800;
    letter-spacing: -0.3px;
  }
  .header-brand .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--c-teal);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .header-user {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--c-text2);
  }
  .room-chip {
    border: 1px solid var(--c-border2);
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--c-text2);
    font-family: var(--mono);
  }
  .switch-user-btn {
    background: transparent;
    border: 1px solid var(--c-border2);
    border-radius: 999px;
    color: var(--c-text2);
    font-family: var(--font);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .switch-user-btn:hover {
    background: var(--c-surface3);
    color: var(--c-text);
  }
  .lang-select {
    background: var(--c-surface2);
    border: 1px solid var(--c-border2);
    border-radius: 999px;
    color: var(--c-text);
    font-family: var(--font);
    font-size: 11px;
    font-weight: 600;
    padding: 5px 10px;
    outline: none;
    cursor: pointer;
  }
  .avatar-sm {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: white;
  }

  /* ─── Sidebar left (demands) ─── */
  .sidebar-left {
    border-right: 1px solid var(--c-border);
    background: var(--c-surface);
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--c-border);
  }
  .sidebar-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--c-text3); text-transform: uppercase; margin-bottom: 12px;
  }
  .add-demand-row {
    display: flex; gap: 6px;
  }
  .add-demand-input {
    flex: 1;
    background: var(--c-surface2);
    border: 1px solid var(--c-border);
    border-radius: var(--r2);
    color: var(--c-text);
    font-family: var(--font);
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    min-width: 0;
    transition: border-color 0.2s;
  }
  .add-demand-input:focus { border-color: var(--c-accent); }
  .btn-icon {
    background: var(--c-accent);
    border: none;
    border-radius: var(--r2);
    color: white;
    font-size: 18px; font-weight: 700;
    width: 34px; height: 34px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .btn-icon:hover { background: var(--c-accent2); }

  .demand-list { flex: 1; padding: 8px; overflow-y: auto; }
  .demand-item {
    padding: 10px 12px;
    border-radius: var(--r2);
    cursor: pointer;
    margin-bottom: 4px;
    border: 1px solid transparent;
    transition: all 0.15s;
    position: relative;
  }
  .demand-item:hover { background: var(--c-surface2); border-color: var(--c-border); }
  .demand-item.active { background: var(--c-surface3); border-color: var(--c-accent); }
  .demand-item.done { opacity: 0.6; }
  .demand-item.needs-review {
    border-color: rgba(216,90,48,0.45);
    background: rgba(216,90,48,0.06);
  }
  .demand-title {
    font-size: 13px; font-weight: 600; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .demand-meta {
    display: flex; align-items: center; justify-content: space-between;
    gap: 6px;
  }
  .demand-status {
    font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
    padding: 2px 7px; border-radius: 20px;
  }
  .status-pending  { background: rgba(136,135,128,0.15); color: #888780; }
  .status-voting   { background: rgba(127,119,221,0.2); color: #AFA9EC; }
  .status-done     { background: rgba(29,158,117,0.2); color: #5DCAA5; }
  .demand-score {
    font-family: var(--mono);
    font-size: 12px; font-weight: 500;
    color: var(--c-teal);
  }
  .demand-score.review { color: var(--c-coral); }
  .review-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.4px;
    color: #ffb199;
    background: rgba(216,90,48,0.18);
    border: 1px solid rgba(216,90,48,0.5);
    padding: 2px 7px;
    border-radius: 20px;
  }
  .demand-actions {
    display: flex; gap: 4px; margin-top: 6px;
  }
  .btn-xs {
    background: transparent;
    border: 1px solid var(--c-border2);
    border-radius: 6px;
    color: var(--c-text2);
    font-family: var(--font);
    font-size: 10px; font-weight: 600;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-xs:hover { background: var(--c-surface3); color: var(--c-text); }
  .btn-xs.start { border-color: var(--c-accent); color: var(--c-accent); }
  .btn-xs.start:hover { background: rgba(127,119,221,0.15); }
  .btn-xs.danger { border-color: var(--c-coral); color: var(--c-coral); }
  .btn-xs.danger:hover { background: rgba(216,90,48,0.1); }

  /* ─── Main area ─── */
  .main {
    overflow-y: auto;
    padding: 32px;
    display: flex; flex-direction: column; gap: 24px;
  }

  .empty-state {
    margin: auto;
    text-align: center;
    padding: 48px;
  }
  .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
  .empty-state h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .empty-state p { color: var(--c-text2); font-size: 15px; }

  /* ─── Voting area ─── */
  .voting-header {
    background: var(--c-surface);
    border: 1px solid var(--c-border2);
    border-radius: 16px;
    padding: 24px 28px;
  }
  .voting-demand-title {
    font-size: 22px; font-weight: 800; margin-bottom: 8px;
  }
  .round-progress {
    display: flex; gap: 8px; align-items: center; margin-bottom: 20px;
  }
  .round-pip {
    height: 4px; flex: 1; border-radius: 2px;
    background: var(--c-surface3);
    transition: background 0.3s;
  }
  .round-pip.active { background: var(--c-accent); }
  .round-pip.done   { background: var(--c-teal); }

  .round-card {
    background: var(--c-surface2);
    border: 1px solid var(--c-border);
    border-radius: var(--r);
    padding: 20px 24px;
  }
  .round-question {
    display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
  }
  .round-icon { font-size: 20px; }
  .round-title {
    font-size: 16px; font-weight: 700; letter-spacing: -0.2px;
  }
  .round-sub {
    font-size: 12px; color: var(--c-text3); font-family: var(--mono);
    margin-bottom: 20px; padding-left: 30px;
  }
  .cheat-sheet {
    margin-top: 14px;
    background: var(--c-surface3);
    border: 1px solid var(--c-border2);
    border-radius: 10px;
    overflow: hidden;
  }
  .cheat-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-bottom: 1px solid var(--c-border);
    background: rgba(127,119,221,0.12);
    gap: 12px;
  }
  .cheat-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  .cheat-sub {
    font-size: 11px;
    color: var(--c-text3);
  }
  .cheat-grid {
    display: grid;
    grid-template-columns: 1.35fr repeat(6, 1fr);
    border-top: 1px solid var(--c-border);
  }
  .cheat-cell {
    padding: 10px 8px;
    border-right: 1px solid var(--c-border);
    border-bottom: 1px solid var(--c-border);
    font-size: 11px;
    line-height: 1.25;
    color: var(--c-text2);
    text-align: center;
  }
  .cheat-row-title {
    text-align: left;
    font-weight: 700;
    color: var(--c-text);
    background: var(--c-surface2);
  }
  .cheat-score {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--c-text);
    font-weight: 700;
  }
  .cheat-note {
    display: block;
    margin-top: 4px;
    font-size: 10px;
    color: var(--c-text3);
    line-height: 1.1;
  }

  /* ─── Vote cards ─── */
  .vote-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(62px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .vote-card {
    aspect-ratio: 3/4;
    background: var(--c-surface3);
    border: 2px solid var(--c-border);
    border-radius: 10px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 20px; font-weight: 800;
    font-family: var(--mono);
    color: var(--c-text2);
    transition: all 0.15s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .vote-card:hover {
    border-color: var(--c-accent);
    color: var(--c-text);
    transform: translateY(-3px);
    background: rgba(127,119,221,0.1);
  }
  .vote-card.selected {
    border-color: var(--c-accent);
    background: rgba(127,119,221,0.2);
    color: white;
    transform: translateY(-6px);
    box-shadow: 0 8px 24px rgba(127,119,221,0.3);
  }
  .vote-card.selected::after {
    content: '✓';
    position: absolute; bottom: 4px;
    font-size: 10px; color: var(--c-accent);
    font-family: var(--font);
  }
  .vote-card .card-label {
    font-size: 9px; font-family: var(--font);
    color: var(--c-text3); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-top: 4px;
  }
  .vote-card.high {
    border-color: rgba(216,90,48,0.35);
    background: rgba(216,90,48,0.08);
  }
  .vote-card.high:hover,
  .vote-card.high.selected {
    border-color: var(--c-coral);
    background: rgba(216,90,48,0.22);
  }

  /* Labels for specific vote values */
  .vote-label { font-size: 8px; color: var(--c-text3); text-align: center; padding: 0 4px; }

  /* ─── Votes display ─── */
  .votes-display {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
  }
  .voter-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--c-surface3);
    border: 1px solid var(--c-border);
    border-radius: 20px;
    padding: 5px 12px 5px 6px;
    font-size: 13px;
  }
  .voter-chip .val {
    font-family: var(--mono); font-weight: 700;
    font-size: 14px;
  }
  .voter-chip.pending { color: var(--c-text3); }

  /* ─── Action buttons ─── */
  .action-row {
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .btn {
    background: var(--c-surface3);
    border: 1px solid var(--c-border2);
    border-radius: var(--r2);
    color: var(--c-text);
    font-family: var(--font);
    font-size: 14px; font-weight: 600;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--c-surface2); border-color: var(--c-border2); }
  .btn.primary {
    background: var(--c-accent);
    border-color: var(--c-accent);
    color: white;
  }
  .btn.primary:hover { background: var(--c-accent2); border-color: var(--c-accent2); }
  .btn.success {
    background: var(--c-teal2);
    border-color: var(--c-teal);
    color: white;
  }
  .btn.success:hover { background: #085041; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* ─── Results ─── */
  .results-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  }
  .result-card {
    background: var(--c-surface2);
    border: 1px solid var(--c-border);
    border-radius: var(--r);
    padding: 16px;
    text-align: center;
  }
  .result-round-name {
    font-size: 11px; font-weight: 600; color: var(--c-text3);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
  }
  .result-avg {
    font-family: var(--mono); font-size: 32px; font-weight: 500;
    color: var(--c-accent);
  }
  .result-votes {
    display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; justify-content: center;
  }
  .result-vote-pill {
    background: var(--c-surface3);
    border-radius: 20px;
    padding: 2px 8px;
    font-family: var(--mono); font-size: 11px; color: var(--c-text2);
  }
  .final-score-banner {
    background: linear-gradient(135deg, rgba(127,119,221,0.15), rgba(29,158,117,0.1));
    border: 1px solid rgba(127,119,221,0.3);
    border-radius: var(--r);
    padding: 20px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .final-score-banner.review {
    background: linear-gradient(135deg, rgba(216,90,48,0.2), rgba(186,117,23,0.12));
    border-color: rgba(216,90,48,0.45);
  }
  .final-score-label { font-size: 13px; color: var(--c-text2); font-weight: 600; }
  .final-score-value {
    font-family: var(--mono);
    font-size: 42px; font-weight: 500;
    background: linear-gradient(135deg, #a49ef0, #5DCAA5);
    background-clip: text;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .review-alert {
    margin-top: 12px;
    background: rgba(216,90,48,0.14);
    border: 1px solid rgba(216,90,48,0.45);
    border-radius: var(--r2);
    padding: 10px 12px;
    color: #ffd5c7;
    font-size: 12px;
    font-weight: 600;
  }

  /* ─── Sidebar right (participants) ─── */
  .sidebar-right {
    border-left: 1px solid var(--c-border);
    background: var(--c-surface);
    overflow-y: auto;
    padding: 16px;
  }
  .participant-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 6px; border-radius: var(--r2);
    margin-bottom: 4px;
    transition: background 0.15s;
  }
  .participant-item:hover { background: var(--c-surface2); }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: white; flex-shrink: 0;
  }
  .participant-name {
    font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .participant-you {
    font-size: 10px; color: var(--c-text3); font-family: var(--mono);
  }
  .role-badge {
    display: inline-block;
    margin-top: 2px;
    font-size: 10px;
    border: 1px solid var(--c-border2);
    border-radius: 999px;
    padding: 1px 7px;
    color: var(--c-text2);
  }
  .role-badge.owner { border-color: var(--c-amber); color: #f5be66; }
  .role-badge.admin { border-color: var(--c-accent); color: #b6b0ee; }
  .participant-actions {
    display: flex;
    gap: 4px;
    margin-left: auto;
  }
  .voted-badge {
    margin-left: auto;
    width: 8px; height: 8px; border-radius: 50%;

let myId, myName, myColor, mySessionId, myAvatar = '🙂';
let currentRoomCode = localStorage.getItem(STORAGE_ROOM_KEY) || '';
let appState = {};
let myVotes = {}; // demandId+roundIdx → value
let pollTimer = null;
let heartbeatTimer = null;
let syncingNow = false;
let reconnecting = false;
let reconnectToastAt = 0;
let currentLang = localStorage.getItem(STORAGE_LANG_KEY) || 'pt';

function loadCredentials() {
  try {
    const parsed = JSON.parse(localStorage.getItem(STORAGE_CREDENTIALS_KEY) || '[]');
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

function saveCredentials(credentials) {
  localStorage.setItem(STORAGE_CREDENTIALS_KEY, JSON.stringify(credentials));
}

function getActiveCredential() {
  const activeId = localStorage.getItem(STORAGE_ACTIVE_CREDENTIAL_KEY);
  if (!activeId) return null;
  const credentials = loadCredentials();
  return credentials.find(c => c.id === activeId && !c.deleted) || null;
}

function setActiveCredential(cred) {
  localStorage.setItem(STORAGE_ACTIVE_CREDENTIAL_KEY, cred.id);
  myName = cred.name;
  mySessionId = cred.sessionId;
  myAvatar = cred.avatar || '🙂';
  localStorage.setItem(STORAGE_NAME_KEY, myName);
  localStorage.setItem(STORAGE_SESSION_KEY, mySessionId);
}

function upsertCredential({ name, sessionId, avatar }) {
  const credentials = loadCredentials();
  let cred = credentials.find(c => c.sessionId === sessionId);
  if (!cred) {
    cred = {
      id: generateSessionId(),
      sessionId,
      name,
      avatar: avatar || '🙂',
      deleted: false,
      createdAt: Date.now(),
      lastUsedAt: Date.now(),
    };
    credentials.unshift(cred);
  } else {
    cred.name = name;
    cred.avatar = avatar || cred.avatar || '🙂';
    cred.deleted = false;
    cred.lastUsedAt = Date.now();
  }
  saveCredentials(credentials);
  setActiveCredential(cred);
  return cred;
}

function t(key) {
  return I18N[currentLang]?.[key] ?? I18N.en[key] ?? key;
}

function formatText(template, values) {
  return String(template).replace(/\{(\w+)\}/g, (_, k) => values?.[k] ?? '');
}

function setLanguage(lang) {
  currentLang = lang === 'en' ? 'en' : 'pt';
  localStorage.setItem(STORAGE_LANG_KEY, currentLang);
  applyI18nStatic();
  render();
}

function applyI18nStatic() {
  document.documentElement.lang = currentLang === 'pt' ? 'pt-BR' : 'en';
  const langSelect = document.getElementById('lang-select');
  if (langSelect) langSelect.value = currentLang;
  document.getElementById('join-subtitle').textContent = t('joinSubtitle');
  document.getElementById('name-input').placeholder = t('namePlaceholder');
  document.getElementById('avatar-input').title = t('chooseAvatar');
  document.getElementById('join-btn').textContent = t('joinBtn');
  document.getElementById('room-code-input').placeholder = t('roomCodePlaceholder');
  document.getElementById('room-name-input').placeholder = t('roomNamePlaceholder');
  const joinRoomBtn = document.getElementById('join-room-btn');
  if (joinRoomBtn) joinRoomBtn.textContent = t('enterRoom');
  document.getElementById('create-room-btn').textContent = t('createRoom');
  document.getElementById('cred-title').textContent = t('oldCreds');
  document.getElementById('reset-browser-btn').textContent = t('resetAll');
  document.getElementById('reset-header-btn').textContent = t('resetAll');
  document.getElementById('owned-rooms-title').textContent = t('myRooms');
  document.getElementById('leave-room-btn').textContent = t('leaveRoom');
  document.getElementById('switch-user-btn').textContent = t('switchUser');
  document.getElementById('demands-label').textContent = t('demands');
  document.getElementById('participants-label').textContent = t('participants');
  document.getElementById('demand-input').placeholder = t('demandInputPlaceholder');
  document.getElementById('empty-title').textContent = t('emptyTitle');
  document.getElementById('empty-subtitle').textContent = t('emptySubtitle');
  document.getElementById('header-room').textContent = formatText(t('roomChip'), { code: appState.roomCode || '----' });
}

function generateSessionId() {
  if (window.crypto && typeof window.crypto.randomUUID === 'function') {
    return window.crypto.randomUUID();
  }
  return 'sess_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function enterAppScreen() {
  document.getElementById('join-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('header-name').textContent = myName || '';
}

function enterJoinScreen() {
  document.getElementById('join-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('header-name').textContent = '';
  const av = document.getElementById('header-avatar');
  av.textContent = '';
  av.style.background = 'transparent';
}

function stopSync() {
  clearInterval(pollTimer);
  clearInterval(heartbeatTimer);
  pollTimer = null;
  heartbeatTimer = null;
  syncingNow = false;
}

async function fetchState(touch = false) {
  if (!myName || syncingNow) return;
  syncingNow = true;

  try {
    const params = new URLSearchParams();
    if (touch) params.set('touch', '1');
    params.set('name', myName);
    params.set('avatar', myAvatar || '🙂');
    if (mySessionId) params.set('sessionId', mySessionId);
    if (currentRoomCode) params.set('roomCode', currentRoomCode);

    const res = await fetch(`/api/state?${params.toString()}`);
    if (!res.ok) throw new Error('state request failed');

    const data = await res.json();
    if (data?.error) {
      const msg = data.error === 'Room not found'
        ? t('roomNotFound')
        : data.error === 'Removed from room'
          ? t('removedFromRoom')
          : data.error;
      toast(msg);
    }
    if (data?.participantId) myId = data.participantId;
    if (data?.sessionId) {
      mySessionId = data.sessionId;
      localStorage.setItem(STORAGE_SESSION_KEY, mySessionId);
    }
    currentRoomCode = data?.roomCode || data?.state?.roomCode || '';
    if (currentRoomCode) localStorage.setItem(STORAGE_ROOM_KEY, currentRoomCode);
    else {
      localStorage.removeItem(STORAGE_ROOM_KEY);
      myId = null;
    }
    if (data?.state) {
      appState = data.state;
      render();
    }

    reconnecting = false;
    reconnectToastAt = 0;
  } catch {
    reconnecting = true;
    const now = Date.now();
    if (now - reconnectToastAt > 2000) {
      reconnectToastAt = now;
      toast(t('reconnectQueued'));
    }
  } finally {
    syncingNow = false;
  }
}

async function postAction(obj) {
  if (!myName) return;

  try {
    const res = await fetch('/api/action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        ...obj,
        name: myName,
        avatar: myAvatar || '🙂',
        sessionId: mySessionId,
        roomCode: currentRoomCode,
      }),
    });

    if (!res.ok) throw new Error('action request failed');
    const data = await res.json();
    if (data?.error) {
      const msg = data.error === 'Room not found'
        ? t('roomNotFound')
        : data.error === 'Removed from room'
          ? t('removedFromRoom')
          : data.error;
      toast(msg);
    }

    if (data?.participantId) myId = data.participantId;
    if (data?.sessionId) {
      mySessionId = data.sessionId;
      localStorage.setItem(STORAGE_SESSION_KEY, mySessionId);
    }
    currentRoomCode = data?.roomCode || data?.state?.roomCode || '';
    if (currentRoomCode) localStorage.setItem(STORAGE_ROOM_KEY, currentRoomCode);
    else {
      localStorage.removeItem(STORAGE_ROOM_KEY);
      myId = null;
    }
    if (data?.state) {
      appState = data.state;
      render();
    }

    reconnecting = false;
    reconnectToastAt = 0;
  } catch {
    reconnecting = true;
    const now = Date.now();
    if (now - reconnectToastAt > 2000) {
      reconnectToastAt = now;
      toast(t('reconnectQueued'));
    }
    fetchState(true);
  }
}

function startSync() {
  stopSync();
  fetchState(true);
  pollTimer = setInterval(() => fetchState(false), 1200);
  heartbeatTimer = setInterval(() => {
    if (currentRoomCode) postAction({ type: 'ping' });
  }, 12000);
}

function send(obj) {
  const allowedWithoutRoom = new Set(['create_room', 'join_room', 'leave_room']);
  if (!currentRoomCode && !allowedWithoutRoom.has(obj.type)) {
    toast(t('roomRequired'));
    return;
  }
  postAction(obj);
}

function activateCredentialAndSync(cred) {
  setActiveCredential(cred);
  currentRoomCode = '';
  localStorage.removeItem(STORAGE_ROOM_KEY);
  stopSync();
  myId = null;
  myColor = null;
  myVotes = {};
  startSync();
}

function ensureCredentialFromInputs() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { toast(t('enterName')); return null; }
  const avatar = document.getElementById('avatar-input').value || '🙂';
  const sameActive = mySessionId && myName && myName === name;
  const sessionId = sameActive ? mySessionId : generateSessionId();
  const cred = upsertCredential({ name, sessionId, avatar });
  activateCredentialAndSync(cred);
  return cred;
}

function renderCredentialList() {
  const wrap = document.getElementById('cred-wrap');
  const list = document.getElementById('cred-list');
  if (!wrap || !list) return;

  const creds = loadCredentials().filter(c => !c.deleted);
  if (!creds.length) {
    wrap.style.display = 'block';
    list.innerHTML = `<div style="font-size:12px;color:var(--c-text3)">${t('noCredsYet')}</div>`;
    return;
  }

  wrap.style.display = 'block';
  list.innerHTML = creds.map(c => `
    <div class="owned-room-item">
      <div>
        <div style="font-size:13px;font-weight:700">${c.avatar || '🙂'} ${escHtml(c.name)}</div>
        <div class="meta">${t('loginAs')}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn-xs" onclick="loginWithCredential('${c.id}')">${t('enterRoom')}</button>
        <button class="btn-xs danger" onclick="deleteCredential('${c.id}')">${t('deleteCred')}</button>
      </div>
    </div>
  `).join('');
}

function loginWithCredential(id) {
  const cred = loadCredentials().find(c => c.id === id && !c.deleted);
  if (!cred) return;
  activateCredentialAndSync(cred);
  document.getElementById('name-input').value = cred.name;
  document.getElementById('avatar-input').value = cred.avatar || '🙂';
}

function deleteCredential(id) {
  const credentials = loadCredentials();
  const cred = credentials.find(c => c.id === id);
  if (!cred) return;
  cred.deleted = true;
  saveCredentials(credentials);
  if (localStorage.getItem(STORAGE_ACTIVE_CREDENTIAL_KEY) === id) {
    localStorage.removeItem(STORAGE_ACTIVE_CREDENTIAL_KEY);
    changeUser();
  }
  renderCredentialList();
}

function createRoom() {
  if (!myName || !mySessionId) {
    if (!ensureCredentialFromInputs()) return;
  }
  const roomName = document.getElementById('room-name-input').value.trim();
  send({ type: 'create_room', roomName });
  document.getElementById('room-name-input').value = '';
}

function joinRoomFromInput() {
  const code = document.getElementById('room-code-input').value.replace(/\D/g, '').slice(0, 4);
  document.getElementById('room-code-input').value = code;
  if (!code) return;
  if (!myName || !mySessionId) {
    if (!ensureCredentialFromInputs()) return;
  }
  send({ type: 'join_room', targetRoomCode: code });
}

function openOwnedRoom(code) {
  send({ type: 'join_room', targetRoomCode: code });
}

function leaveRoom() {
  send({ type: 'leave_room' });
}

// ─── Join ────────────────────────────────────────────────────────────────────
function joinSession() {
  const code = document.getElementById('room-code-input').value.replace(/\D/g, '').slice(0, 4);
  document.getElementById('room-code-input').value = code;
  if (!code) { toast(t('roomRequired')); return; }

  if (!myName || !mySessionId) {
    if (!ensureCredentialFromInputs()) return;
  }
  send({ type: 'join_room', targetRoomCode: code });
}

function restoreSession() {
  const active = getActiveCredential();
  if (!active) {
    enterJoinScreen();
    renderCredentialList();
    return;
  }

  setActiveCredential(active);
  document.getElementById('name-input').value = myName;
  document.getElementById('avatar-input').value = myAvatar || '🙂';
  startSync();
}

function changeUser() {
  stopSync();

  localStorage.removeItem(STORAGE_NAME_KEY);
  localStorage.removeItem(STORAGE_SESSION_KEY);
  localStorage.removeItem(STORAGE_ROOM_KEY);
  myId = null;
  myName = null;
  myColor = null;
  mySessionId = null;
  myAvatar = '🙂';
  currentRoomCode = '';
  myVotes = {};
  reconnecting = false;
  appState = {};
  document.getElementById('name-input').value = '';
  document.getElementById('avatar-input').value = '🙂';
  localStorage.removeItem(STORAGE_ACTIVE_CREDENTIAL_KEY);
  enterJoinScreen();
  renderCredentialList();
}

function resetBrowserData() {
  stopSync();
  myId = null;
  myColor = null;
  myVotes = {};
  appState = {};
  myName = null;
  mySessionId = null;
  myAvatar = '🙂';
  currentRoomCode = '';
  reconnecting = false;
  localStorage.removeItem(STORAGE_ACTIVE_CREDENTIAL_KEY);
  localStorage.removeItem(STORAGE_NAME_KEY);
  localStorage.removeItem(STORAGE_SESSION_KEY);
  localStorage.removeItem(STORAGE_ROOM_KEY);
  document.getElementById('name-input').value = '';
  document.getElementById('room-code-input').value = '';
  document.getElementById('room-name-input').value = '';
  document.getElementById('avatar-input').value = '🙂';
  enterJoinScreen();
  renderCredentialList();
}

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinSession();
});

restoreSession();
applyI18nStatic();

function renderOwnedRoomsJoin() {
  const rooms = appState.ownedRooms || [];
  const wrap = document.getElementById('owned-rooms-wrap');
  const list = document.getElementById('owned-rooms-list');
  if (!wrap || !list) return;

  if (!myName) {
    wrap.style.display = 'none';
    return;
  }

  wrap.style.display = 'block';
  if (!rooms.length) {
    list.innerHTML = `<div style="font-size:12px;color:var(--c-text3)">${t('noRoomsYet')}</div>`;
    return;
  }

  list.innerHTML = rooms.map(room => `
    <div class="owned-room-item">
      <div>
        <div style="font-size:13px;font-weight:700">#${room.code} · ${escHtml(room.name)}</div>
        <div class="meta">${room.doneDemands}/${room.totalDemands} done</div>
      </div>
      <button class="btn-xs" onclick="openOwnedRoom('${room.code}')">${t('enterRoom')}</button>
    </div>
  `).join('');
}

// ─── Render ──────────────────────────────────────────────────────────────────
function render() {
  if (myName && appState.roomCode) enterAppScreen();
  else enterJoinScreen();

  const participants = appState.participants || {};
  const me = myId ? participants[myId] : null;
  if (me) {
    myColor = me.color;
    myAvatar = me.avatar || myAvatar;
    const av = document.getElementById('header-avatar');
    av.textContent = me.avatar || '🙂';
    av.style.background = myColor;
  }

  document.getElementById('header-room').textContent = formatText(t('roomChip'), { code: appState.roomCode || '----' });
  document.getElementById('leave-room-btn').style.display = appState.roomCode ? 'inline-flex' : 'none';
  renderCredentialList();
  renderOwnedRoomsJoin();

  renderDemands();
  renderMain();
  renderParticipants();
}

function initials(name) {
  return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
}

function participantAvatar(p) {
  return p?.avatar || '🙂';
}

function roleText(role) {
  if (role === 'owner') return t('roleOwner');
  if (role === 'admin') return t('roleAdmin');
  return t('roleMember');
}

function demandNeedsReview(demand) {
  return !!demand && (demand.requiresReview === true || Number(demand.finalScore) > 13);
}

function renderDemands() {
  const list = document.getElementById('demand-list');
  if (!appState.roomCode) {
    list.innerHTML = '';
    return;
  }
  const demands = appState.demands || [];
  const canManage = !!appState.canManageRoom;
  list.innerHTML = demands.map(d => {
    const isActive = d.id === appState.currentDemandId;
    const needsReview = demandNeedsReview(d);
    return `<div class="demand-item ${isActive ? 'active' : ''} ${d.status === 'done' ? 'done' : ''} ${needsReview ? 'needs-review' : ''}" onclick="selectDemand('${d.id}')">
      <div class="demand-title">${escHtml(d.title)}</div>
      <div class="demand-meta">
        <span class="demand-status status-${d.status}">${t('status')[d.status] || d.status}</span>
        ${needsReview ? `<span class="review-badge">${t('reviewBadge')}</span>` : ''}
        ${d.finalScore !== null ? `<span class="demand-score ${needsReview ? 'review' : ''}">${d.finalScore} pts</span>` : ''}
      </div>
      ${canManage ? `<div class="demand-actions">
        ${d.status === 'pending' ? `<button class="btn-xs start" onclick="startDemand('${d.id}',event)">${t('startVoting')}</button>` : ''}
        ${d.status === 'done'    ? `<button class="btn-xs" onclick="resetDemand('${d.id}',event)">${t('reestimate')}</button>` : ''}
        <button class="btn-xs danger" onclick="deleteDemand('${d.id}',event)">✕</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

function renderParticipants() {
  const list = document.getElementById('participant-list');
  if (!appState.roomCode) {
    list.innerHTML = '';
    return;
  }
  const participants = appState.participants || {};
  const activeIds = appState.activeParticipantIds || Object.keys(participants).filter(id => participants[id]?.online);
  const roundData = appState.roundData;

  list.innerHTML = activeIds.map(id => {
    const p = participants[id];
    if (!p) return '';
    let badge = '';
    if (roundData && appState.currentDemand?.status === 'voting') {
      const voted = roundData.voterIds.includes(id);
      badge = voted
        ? `<div class="voted-badge" title="${t('voted')}"></div>`
        : `<div class="not-voted-badge" title="${t('waiting')}"></div>`;
    }
    const isMe = id === myId;
    const canRoles = !!appState.canManageRoles;
    const canKick = !!appState.canManageRoom;
    const showSetAdmin = canRoles && p.role === 'member';
    const showSetMember = canRoles && p.role === 'admin';
    const showKick = canKick && !isMe && p.role !== 'owner';
    return `<div class="participant-item">
      <div class="avatar" style="background:${p.color}">${participantAvatar(p)}</div>
      <div>
        <div class="participant-name">${escHtml(p.name)}</div>
        <div class="role-badge ${p.role || 'member'}">${roleText(p.role)}</div>
        ${isMe ? `<div class="participant-you">${t('you')}</div>` : ''}
      </div>
      <div class="participant-actions">
        ${showSetAdmin ? `<button class="btn-xs" onclick="setRole('${id}','admin')">${t('roleSetAdmin')}</button>` : ''}
        ${showSetMember ? `<button class="btn-xs" onclick="setRole('${id}','member')">${t('roleSetMember')}</button>` : ''}
        ${showKick ? `<button class="btn-xs danger" onclick="kickMember('${id}')">${t('kickMember')}</button>` : ''}
      </div>
      ${badge}
    </div>`;
  }).join('');
}

function renderMain() {
  const main = document.getElementById('main-area');
  if (!appState.roomCode) {
    main.innerHTML = `<div class="empty-state">
      <div class="icon">🧩</div>
      <h2>${t('myRooms')}</h2>
      <p>${t('roomRequired')}</p>
    </div>`;
    return;
  }
  const demand = appState.currentDemand;

  if (!demand) {
    main.innerHTML = `<div class="empty-state">
      <div class="icon">🎯</div>
      <h2>${t('emptyTitle')}</h2>
      <p>${t('emptySubtitle')}</p>
    </div>`;
    return;
  }

  if (demand.status === 'done') {
    renderDoneView(main, demand);
    return;
  }

  if (demand.status === 'pending') {
    renderPendingView(main, demand);
    return;
  }

  renderVotingView(main, demand);
}

function renderPendingView(main, demand) {
  const canManage = !!appState.canManageRoom;
  main.innerHTML = `
    <div class="voting-header">
      <div class="voting-demand-title">${escHtml(demand.title)}</div>
      <div style="font-size:13px;color:var(--c-text2)">${t('pendingDesc')}</div>
    </div>
    <div class="round-card">
      <div class="round-question">
        <span class="round-icon">🕒</span>
        <span class="round-title">${t('pendingTitle')}</span>
      </div>
      <div class="round-sub">${t('pendingSub')}</div>
      <div class="action-row">
        <button class="btn primary" onclick="startDemand('${demand.id}',{stopPropagation:()=>{}})" ${canManage ? '' : 'disabled'}>${t('startVoting')}</button>
      </div>
    </div>
  `;
}

function renderCheatSheet() {
  const cheat = I18N[currentLang].cheat;
  const cols = [1, 2, 3, 5, 8, 13];
  const colHeader = cols.map(score => `<div class="cheat-cell cheat-score">${score}</div>`).join('');
  const row = (title, key) => `
    <div class="cheat-cell cheat-row-title">${title}</div>
    ${cols.map(score => `<div class="cheat-cell">${cheat.cols[score][key] || ''}</div>`).join('')}
  `;
  const pointRow = `
    <div class="cheat-cell cheat-row-title">${cheat.rows.points}</div>
    ${cols.map(score => {
      const note = cheat.cols[score].note ? `<span class="cheat-note">${cheat.cols[score].note}</span>` : '';
      return `<div class="cheat-cell"><span class="cheat-score">${score}</span>${note}</div>`;
    }).join('')}
  `;

  return `
    <div class="cheat-sheet">
      <div class="cheat-head">
        <div class="cheat-title">${cheat.title}</div>
        <div class="cheat-sub">${cheat.subtitle}</div>
      </div>
      <div class="cheat-grid">
        <div class="cheat-cell cheat-row-title">SP</div>
        ${colHeader}
        ${row(cheat.rows.knowledge, 'k')}
        ${row(cheat.rows.dependencies, 'd')}
        ${row(cheat.rows.effort, 'e')}
        ${pointRow}
      </div>
    </div>
  `;
}

function renderVotingView(main, demand) {
  const rd = appState.roundData;
  if (!rd) { main.innerHTML = ''; return; }

  const roundIdx = rd.index;
  const rtypes = appState.roundTypes;
  const voteKey = demand.id + '_' + roundIdx;
  const myVote = myVotes[voteKey];

  // past rounds summary
  let pastRoundsHtml = '';
  for (let i = 0; i < roundIdx; i++) {
    const r = demand.rounds[i];
    const vals = Object.values(r.votes).map(Number).filter(n => !isNaN(n));
    const avg = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '–';
    pastRoundsHtml += `<div class="result-card" style="margin-bottom:0">
      <div class="result-round-name">${rtypes[i].icon} ${rtypes[i].key}</div>
      <div class="result-avg">${avg}</div>
      <div class="result-votes">${Object.entries(r.votes).map(([pid, v]) => {
        const p = appState.participants[pid];
        const name = p ? p.name.split(' ')[0] : '?';
        return `<span class="result-vote-pill">${name}: ${v}</span>`;
      }).join('')}</div>
    </div>`;
  }

  // progress pips
  const pips = [0,1,2].map(i =>
    `<div class="round-pip ${i < roundIdx ? 'done' : i === roundIdx ? 'active' : ''}"></div>`
  ).join('');

  // vote cards for this round
  const voteOptions = getVoteOptions(rd.key);
  const voteCardsHtml = voteOptions.map(opt => {
    const lbl = (VOTE_LABELS[currentLang]?.[rd.key] || {})[opt.v] || '';
    const isHigh = opt.v > 13;
    return `<div class="vote-card ${isHigh ? 'high' : ''} ${myVote == opt.v && !rd.revealed ? 'selected' : ''}"
      onclick="castVote(${opt.v})">
      <span>${opt.label}</span>
      ${lbl ? `<span class="vote-label">${lbl}</span>` : ''}
    </div>`;
  }).join('');

  // votes display
  const participants = appState.participants;
  const activeIds = appState.activeParticipantIds || Object.keys(participants).filter(pid => participants[pid]?.online);
  const votesHtml = activeIds.map(pid => {
    const p = participants[pid];
    if (!p) return '';
    const hasVoted = rd.voterIds.includes(pid);
    const val = rd.revealed ? (rd.votes[pid] ?? '–') : (hasVoted ? '✓' : '…');
    return `<div class="voter-chip ${hasVoted ? '' : 'pending'}">
      <div class="avatar-sm" style="width:22px;height:22px;background:${p.color};font-size:11px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:white;font-weight:700">${participantAvatar(p)}</div>
      <span>${p.name.split(' ')[0]}</span>
      <span class="val" style="color:${rd.revealed ? '#a49ef0' : 'inherit'}">${val}</span>
    </div>`;
  }).join('');

  const votedActiveCount = activeIds.filter(pid => rd.voterIds.includes(pid)).length;
  const allVoted = activeIds.length > 0 && votedActiveCount >= activeIds.length;
  const canManage = !!appState.canManageRoom;
  const canReveal = allVoted || canManage;
  const isLastRound = roundIdx === 2;

  main.innerHTML = `
    <div class="voting-header">
      <div class="voting-demand-title">${escHtml(demand.title)}</div>
      <div class="round-progress">${pips}</div>
      ${pastRoundsHtml ? `<div style="display:grid;grid-template-columns:repeat(${roundIdx},1fr);gap:12px;margin-bottom:0">${pastRoundsHtml}</div>` : ''}
    </div>

    <div class="round-card">
      <div class="round-question">
        <span class="round-icon">${rd.icon}</span>
        <span class="round-title">${formatText(t('roundTitle'), { n: roundIdx + 1, label: I18N[currentLang].rounds[rd.key] || rd.label })}</span>
      </div>
      <div class="round-sub">${formatText(t('roundOf'), { n: roundIdx + 1, key: rd.key })}</div>

      ${rd.revealed ? '' : `<div class="vote-grid">${voteCardsHtml}</div>`}

      ${renderCheatSheet()}

      <div class="votes-display">${votesHtml}</div>

      <div class="action-row">
        ${!rd.revealed
          ? `<button class="btn primary" onclick="revealVotes()" ${canReveal ? '' : 'disabled'}>
              ${t('revealVotes')} ${allVoted ? '' : `(${votedActiveCount}/${activeIds.length})`}
            </button>`
          : isLastRound
            ? `<button class="btn success" onclick="finishDemand()" ${canManage ? '' : 'disabled'}>${t('finishScore')}</button>`
            : `<button class="btn primary" onclick="nextRound()" ${canManage ? '' : 'disabled'}>${t('nextRound')}</button>`
        }
      </div>
    </div>
  `;
}

function renderDoneView(main, demand) {
  const rtypes = appState.roundTypes;
  const needsReview = demandNeedsReview(demand);
  const roundsHtml = demand.rounds.map((r, i) => {
    const vals = Object.values(r.votes).map(Number).filter(n => !isNaN(n));
    const avg  = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '–';
    const votesList = Object.entries(r.votes).map(([pid,v]) => {
      const p = appState.participants[pid];
      return `<span class="result-vote-pill">${p ? p.name.split(' ')[0] : '?'}: ${v}</span>`;
    }).join('');
    return `<div class="result-card">
      <div class="result-round-name">${rtypes[i].icon} ${rtypes[i].key}</div>
      <div class="result-avg">${avg}</div>
      <div class="result-votes">${votesList}</div>
    </div>`;
  }).join('');

  main.innerHTML = `
    <div class="final-score-banner ${needsReview ? 'review' : ''}">
      <div>
        <div class="final-score-label">${t('finalScore')}</div>
        <div style="font-size:14px;color:var(--c-text2);margin-top:2px">${escHtml(demand.title)}</div>
      </div>
      <div class="final-score-value">${demand.finalScore}</div>
    </div>
    ${needsReview ? `<div class="review-alert">⚠ ${t('reviewRequired')}: ${t('reviewHint')}</div>` : ''}
    <div class="results-grid">${roundsHtml}</div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn" onclick="resetDemand('${demand.id}',{stopPropagation:()=>{}})">${t('reestimate')}</button>
    </div>
  `;
}

function getVoteOptions(roundKey) {
  return VOTE_OPTIONS;
}

// ─── Actions ─────────────────────────────────────────────────────────────────
function addDemand() {
  const input = document.getElementById('demand-input');
  const title = input.value.trim();
  if (!title) return;
  send({ type: 'add_demand', title });
  input.value = '';
}

document.getElementById('demand-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addDemand();
});

document.getElementById('room-code-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinRoomFromInput();
});

document.getElementById('room-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') createRoom();
});

function selectDemand(id) {
  if (!appState.canManageRoom) return;
  send({ type: 'select_demand', demandId: id });
}

function startDemand(id, e) {
  e.stopPropagation();
  if (!appState.canManageRoom) return;
  send({ type: 'start_demand', demandId: id });
}

function deleteDemand(id, e) {
  e.stopPropagation();
  if (!appState.canManageRoom) return;
  send({ type: 'delete_demand', demandId: id });
}

function resetDemand(id, e) {
  e.stopPropagation();
  if (!appState.canManageRoom) return;
  send({ type: 'reset_demand', demandId: id });
}

function castVote(value) {
  const demand = appState.currentDemand;
  if (!demand) return;
  const roundIdx = appState.roundData?.index;
  if (roundIdx === undefined) return;
  if (appState.roundData?.revealed) return;
  const key = demand.id + '_' + roundIdx;
  myVotes[key] = value;
  send({ type: 'vote', value });
  renderMain();
}

function revealVotes() { send({ type: 'reveal' }); }
function nextRound()   { if (appState.canManageRoom) send({ type: 'next_round' }); }
function finishDemand(){ if (appState.canManageRoom) send({ type: 'finish_demand' }); }

function setRole(targetParticipantId, role) {
  send({ type: 'set_role', targetParticipantId, role });
}

function kickMember(targetParticipantId) {
  send({ type: 'kick_member', targetParticipantId });
}

// ─── Utils ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
